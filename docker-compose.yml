version: "3.9"

services:
  postgres-roleplay:
    image: postgres:15
    container_name: postgres-roleplay
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - roleplay-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # avoid conflict with shop db
    networks:
      - roleplay-network

  roleplay-service:
    build:
      context: ./src/RoleplayService
      dockerfile: Dockerfile
    container_name: roleplay-service
    restart: always
    depends_on:
      - postgres-roleplay
    environment:
      POSTGRES_CONNECTION: "Host=${POSTGRES_HOST};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "${ROLEPLAY_PORT}:80"
    networks:
      - roleplay-network

volumes:
  roleplay-postgres-data:

networks:
  roleplay-network:
    driver: bridge
